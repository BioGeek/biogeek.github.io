<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Redirecting to jeroen.vangoey.be</title>

<!-- Bounce humans to the UTM-tagged homepage. No Google Analytics here on purpose:
     the intermediate hop must not fire a pageview, so the only GA hit is on the
     destination, which carries the campaign tags. location.replace keeps /i out of
     the back-button history. The meta refresh is the no-JS fallback. -->
<meta http-equiv="refresh" content="0; url=https://jeroen.vangoey.be/?utm_source=linkedin&amp;utm_medium=social&amp;utm_campaign=profile_featured">
<link rel="canonical" href="https://jeroen.vangoey.be/">
<script>location.replace("https://jeroen.vangoey.be/?utm_source=linkedin&utm_medium=social&utm_campaign=profile_featured");</script>

<!-- Open Graph, so the LinkedIn Featured preview card still renders nicely. -->
<meta property="og:type" content="website">
<meta property="og:url" content="https://jeroen.vangoey.be/">
<meta property="og:title" content="Jeroen Van Goey">
<meta property="og:description" content="Staff Research Engineer and BioAI Lead, building generative models for biology.">
<meta property="og:image" content="https://jeroen.vangoey.be/images/og-image.jpg">
<meta name="twitter:card" content="summary_large_image">
</head>
<body>
<p>Redirecting to <a href="https://jeroen.vangoey.be/?utm_source=linkedin&amp;utm_medium=social&amp;utm_campaign=profile_featured">jeroen.vangoey.be</a>&hellip;</p>
</body>
</html>

name: Update iNaturalist data

on:
  schedule:
    - cron: "0 5 * * 0" # Sundays at 05:00 UTC
  workflow_dispatch: {} # manual "Run workflow" button in the Actions tab

permissions:
  contents: write # commit the updated data (inat.json)
  pages: write
  id-token: write

# Shared with publish + other auto-update workflows so renders/deploys/pushes never race.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Fetch iNaturalist observations
        run: uv run python scripts/fetch_inaturalist.py

      - name: Commit and push data if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -z "$(git status --porcelain)" ]; then
            echo "No data changes."
            exit 0
          fi
          git add -A
          git commit -m "chore: refresh iNaturalist data"
          for attempt in 1 2 3; do
            git pull --rebase --autostash origin main && git push && break
            echo "push attempt $attempt failed; retrying"; sleep 5
          done

      - uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 1.9.38

      - name: Render
        run: uv run quarto render

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs

      - id: deploy
        uses: actions/deploy-pages@v5

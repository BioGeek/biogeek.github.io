name: Update Awesome De Novo screenshot

on:
  schedule:
    - cron: "0 7 * * 1" # Mondays at 07:00 UTC
  workflow_dispatch: {} # manual "Run workflow" button in the Actions tab

permissions:
  contents: write # commit the updated screenshot
  pages: write
  id-token: write

# Shared with publish + AoC workflows so renders/deploys/pushes never race.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7

      # ubuntu-latest ships Google Chrome and ImageMagick; ensure ImageMagick is present.
      - name: Ensure ImageMagick
        run: convert -version || (sudo apt-get update && sudo apt-get install -y imagemagick)

      - name: Re-capture the Awesome De Novo dashboard thumbnail
        run: bash scripts/update_awesome_screenshot.sh

      - name: Commit and push source if changed
        id: changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -z "$(git status --porcelain)" ]; then
            echo "No source changes; skipping render and deploy."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git add -A
          git commit -m "chore: refresh Awesome De Novo screenshot"
          for attempt in 1 2 3; do
            git pull --rebase --autostash origin main && git push && break
            echo "push attempt $attempt failed; retrying"; sleep 5
          done
          echo "changed=true" >> "$GITHUB_OUTPUT"

      # The screenshot rarely changes; only render + deploy when it actually did
      # (a push to main is otherwise already deployed by the publish workflow).
      - name: Install uv
        if: steps.changes.outputs.changed == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        if: steps.changes.outputs.changed == 'true'
        run: uv sync --frozen

      - uses: quarto-dev/quarto-actions/setup@v2
        if: steps.changes.outputs.changed == 'true'
        with:
          version: 1.9.38

      - name: Render
        if: steps.changes.outputs.changed == 'true'
        run: uv run quarto render

      - uses: actions/configure-pages@v6
        if: steps.changes.outputs.changed == 'true'

      - uses: actions/upload-pages-artifact@v5
        if: steps.changes.outputs.changed == 'true'
        with:
          path: docs

      - id: deploy
        if: steps.changes.outputs.changed == 'true'
        uses: actions/deploy-pages@v5

name: Update Awesome De Novo screenshot

on:
  schedule:
    - cron: "0 7 * * 1" # Mondays at 07:00 UTC
  workflow_dispatch: {} # manual "Run workflow" button in the Actions tab

permissions:
  contents: write

concurrency:
  group: site-auto-commit
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ubuntu-latest ships Google Chrome and ImageMagick; ensure ImageMagick is present.
      - name: Ensure ImageMagick
        run: convert -version || (sudo apt-get update && sudo apt-get install -y imagemagick)

      - name: Re-capture the Awesome De Novo dashboard thumbnail
        run: bash scripts/update_awesome_screenshot.sh

      - uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 1.9.38 # keep in sync with local Quarto to avoid site_libs churn

      - name: Render site
        run: quarto render

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit."
            exit 0
          fi
          git add -A
          git commit -m "chore: refresh Awesome De Novo screenshot"
          # Integrate any concurrent push before pushing (belt-and-suspenders).
          for attempt in 1 2 3; do
            git pull --rebase --autostash origin main && git push && exit 0
            echo "push attempt $attempt failed; retrying"; sleep 5
          done
          echo "push failed after retries"; exit 1

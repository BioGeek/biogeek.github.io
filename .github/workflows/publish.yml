name: Publish site

# Renders the Quarto site and deploys it to GitHub Pages.
# Pages source must be set to "GitHub Actions" (Settings -> Pages -> Build and deployment).
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# All site-touching workflows share this group so renders/deploys never race.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 1.9.38

      - name: Render
        run: uv run quarto render

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deploy
        uses: actions/deploy-pages@v4

name: Update Strava data

on:
  schedule:
    - cron: "30 5 * * *" # daily at 05:30 UTC
  workflow_dispatch: {} # manual "Run workflow" button in the Actions tab

permissions:
  contents: write # commit the updated data (strava_runs.json)
  pages: write
  id-token: write

# Shared with publish + other auto-update workflows so renders/deploys/pushes never race.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Fetch Strava activities
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: uv run python scripts/fetch_strava.py

      - name: Commit and push data if changed
        id: changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -z "$(git status --porcelain)" ]; then
            echo "No data changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git add -A
          git commit -m "chore: refresh Strava data"
          for attempt in 1 2 3; do
            git pull --rebase --autostash origin main && git push && break
            echo "push attempt $attempt failed; retrying"; sleep 5
          done
          echo "changed=true" >> "$GITHUB_OUTPUT"

      # Only render + deploy when this run actually changed something
      # (a real change is pushed and deployed by the publish workflow too).
      - uses: quarto-dev/quarto-actions/setup@v2
        if: steps.changes.outputs.changed == 'true'
        with:
          version: 1.9.38

      - name: Render
        if: steps.changes.outputs.changed == 'true'
        run: uv run quarto render

      - uses: actions/configure-pages@v6
        if: steps.changes.outputs.changed == 'true'

      - uses: actions/upload-pages-artifact@v5
        if: steps.changes.outputs.changed == 'true'
        with:
          path: docs

      - id: deploy
        if: steps.changes.outputs.changed == 'true'
        uses: actions/deploy-pages@v5

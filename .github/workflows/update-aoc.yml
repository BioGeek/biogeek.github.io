name: Update Advent of Code stats

on:
  schedule:
    # Daily at 06:00 UTC during December (AoC season; puzzles unlock 05:00 UTC)
    - cron: "0 6 * 12 *"
    # Otherwise on the 1st of each month, January–November, at 06:00 UTC
    - cron: "0 6 1 1-11 *"
  workflow_dispatch: {} # manual "Run workflow" button in the Actions tab

permissions:
  contents: write # commit the updated source (index.qmd)
  pages: write
  id-token: write

# Shared with publish + screenshot workflows so renders/deploys/pushes never race.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync AoC badges from the adventofcode repo README
        run: python scripts/update_aoc.py

      - name: Commit and push source if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -z "$(git status --porcelain)" ]; then
            echo "No source changes."
            exit 0
          fi
          git add -A
          git commit -m "chore: sync Advent of Code stats from repo README"
          for attempt in 1 2 3; do
            git pull --rebase --autostash origin main && git push && break
            echo "push attempt $attempt failed; retrying"; sleep 5
          done

      - uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 1.9.38

      - name: Render
        run: quarto render

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deploy
        uses: actions/deploy-pages@v4

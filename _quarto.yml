project:
  type: website
  output-dir: docs
  post-render:
    - "cp -rv .well-known/. docs/.well-known/"
    - "cp CNAME docs/"

website:
  site-url: https://jeroen.vangoey.be
  favicon: favicon.ico
  description: "Staff Research Engineer in BioAI building generative models for biology: de novo peptide sequencing, proteomics, and personalized cancer vaccines."
  image: images/og-image.png
  open-graph: true
  twitter-card:
    creator: "@BioGeek"
    card-style: summary_large_image
  search: false
  google-analytics: "G-WBNWDFRGEV"
  navbar:
    title: "Jeroen Van Goey"
    left:
      - href: index.qmd
        text: Home


format:
  html:
    theme:
      light: [cosmo, custom.scss]
      dark: [darkly, custom.scss, custom-dark.scss]
    toc: true
    grid:
      body-width: 960px
    include-in-header:
      file: head.html
    include-after-body:
      text: |
        <script type="text/javascript" async src="https://d1bxh8uas1mnw7.cloudfront.net/assets/embed.js"></script>

project:
  type: website
  output-dir: docs
  render:
    # Explicit render set so donkeycar-roadmap.md (and other stray .md like
    # README) is NOT published — the roadmap stays in the repo as a personal
    # "what to work on next" reference only.
    - "*.qmd"
    - "posts/"
    - "projects/"
  post-render:
    - "cp -rv .well-known/. docs/.well-known/"
    - "cp CNAME docs/"

website:
  title: "Jeroen Van Goey"
  site-url: https://jeroen.vangoey.be
  favicon: favicon.ico
  description: "Staff Research Engineer · BioAI Lead, building generative models for biology: de novo peptide sequencing, proteomics, and personalized cancer vaccines."
  image: images/og-image.jpg
  open-graph: true
  twitter-card:
    creator: "@BioGeek"
    card-style: summary_large_image
  search: true
  google-analytics: "G-WBNWDFRGEV"
  navbar:
    title: "Jeroen Van Goey"
    left:
      - href: index.qmd
        text: Home
      - href: blog.qmd
        text: Writing
    right:
      - icon: rss
        href: blog.xml          # auto-generated by the listing's feed: true
        aria-label: RSS feed


format:
  html:
    theme:
      light: [cosmo, custom.scss]
      dark: [darkly, custom.scss, custom-dark.scss]
    toc: true
    grid:
      body-width: 960px
    include-in-header:
      file: head.html
    include-after-body:
      text: |
        <script type="text/javascript" async src="https://d1bxh8uas1mnw7.cloudfront.net/assets/embed.js"></script>
        <script>
          // Quarto's collapsible callout headers carry aria-expanded on a bare <div>,
          // which isn't a valid ARIA role combination; give them role="button". Also drop
          // the generic aria-label so the visible title becomes the accessible name
          // (otherwise the label/name-mismatch audit fails).
          document.querySelectorAll('.callout-header[aria-expanded]').forEach(function (el) {
            el.setAttribute('role', 'button');
            el.removeAttribute('aria-label');
          });
          // Quarto puts role="menu" on the navbar hamburger <button>, an inappropriate
          // role for a button that malforms the accessibility tree (agentic-browsing audit).
          document.querySelectorAll('.navbar-toggler[role]').forEach(function (el) {
            el.removeAttribute('role');
          });
        </script>
